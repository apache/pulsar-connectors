name: Pulsar Connectors CI

on:
  pull_request:
    branches: ['main', 'master', 'branch-*']
  push:
    branches: ['main', 'master', 'branch-*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JDK_DISTRIBUTION: corretto
  JDK_VERSION: 17
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true

jobs:
  build-and-license:
    name: Build and License check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JDK_DISTRIBUTION }}
          java-version: ${{ env.JDK_VERSION }}
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c

      - name: Build all modules
        run: ./gradlew build -x test
      - name: License check (RAT)
        run: ./gradlew rat

  tests:
    name: Tests - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-and-license
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Connectors
            tasks: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JDK_DISTRIBUTION }}
          java-version: ${{ env.JDK_VERSION }}
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c

      - name: Run tests
        run: ./gradlew ${{ matrix.tasks }}
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-test-reports
          path: '**/build/reports/tests/'
          retention-days: 7
