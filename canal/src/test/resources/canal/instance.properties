#################################################
## Canal instance configuration for the integration test.
## Mounted into /home/admin/canal-server/conf/example/instance.properties.
## The v1.1.7 docker image performs no env-var substitution, so the MySQL
## coordinates are baked in here and point at the "mysql" network alias.
#################################################

# enable gtid use true/false
canal.instance.gtidon=false

# position info - empty journal name makes canal start from the current
# binlog position when the instance boots, so only mutations made after
# start-up are captured.
canal.instance.master.address=mysql:3306
canal.instance.master.journal.name=
canal.instance.master.position=
canal.instance.master.timestamp=
canal.instance.master.gtid=

# table meta tsdb - disabled to avoid the extra h2/mysql tsdb wiring; canal
# fetches table metadata live from MySQL instead.
canal.instance.tsdb.enable=false

# username/password used by canal to open the binlog dump connection
canal.instance.dbUsername=root
canal.instance.dbPassword=rootpw
canal.instance.connectionCharset=UTF-8
canal.instance.enableDruid=false

# only track the test schema
canal.instance.filter.regex=testdb\\..*
canal.instance.filter.black.regex=mysql\\.slave_.*

# mq config (unused in tcp mode, kept for parity with the shipped default)
canal.mq.topic=example
canal.mq.partition=0

canal.instance.multi.stream.on=false
